<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖼️ AI Photo Restore - 智能老照片修复</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 50px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
        }
        h1 { 
            font-size: 28px; 
            margin-bottom: 8px; 
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { 
            color: #888; 
            text-align: center; 
            margin-bottom: 35px;
            font-size: 15px;
        }
        .upload-area {
            border: 2px dashed rgba(102,126,234,0.5);
            border-radius: 16px;
            padding: 50px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(102,126,234,0.1);
        }
        .upload-area:hover { 
            border-color: #667eea;
            background: rgba(102,126,234,0.2);
            transform: scale(1.02);
        }
        .upload-icon { font-size: 56px; margin-bottom: 15px; }
        .upload-text { font-size: 18px; color: #ddd; margin-bottom: 8px; }
        .upload-hint { color: #666; font-size: 13px; }
        input[type="file"] { display: none; }
        
        .features {
            display: flex; gap: 15px; margin: 25px 0;
            flex-wrap: wrap; justify-content: center;
        }
        .feature {
            background: rgba(102,126,234,0.2);
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 13px;
            color: #aab;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102,126,234,0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .result { margin-top: 25px; text-align: center; }
        .result img { max-width: 100%; border-radius: 12px; margin-top: 15px; }
        .loading { display: none; text-align: center; padding: 25px; }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(102,126,234,0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .preview-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }
        .preview-box img { max-width: 100%; border-radius: 8px; }
        
        .footer {
            margin-top: 30px;
            text-align: center;
            color: #555;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ AI Photo Restore</h1>
        <p class="subtitle">智能老照片修复 · 一键焕新</p>
        
        <div class="features">
            <span class="feature">✨ 修复划痕</span>
            <span class="feature">🎨 黑白上色</span>
            <span class="feature">📱 增强清晰度</span>
        </div>
        
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📤</div>
            <div class="upload-text">点击或拖拽上传老照片</div>
            <div class="upload-hint">支持 JPG, PNG, WEBP · 最大 10MB</div>
        </div>
        <input type="file" id="fileInput" accept="image/*">
        
        <div id="previewBox" class="preview-box">
            <small style="color:#888;">原始图片预览：</small>
            <img id="previewImg" alt="Preview">
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p style="margin-top:15px;color:#aab;">AI 正在修复中...</p>
        </div>
        
        <button class="btn" id="restoreBtn" disabled onclick="restorePhoto()">
            🚀 开始修复
        </button>
        
        <div id="result" class="result"></div>
        
        <div class="footer">
            Powered by Cloudflare Workers AI
        </div>
    </div>

    <script>
        let selectedFile = null;
        
        document.getElementById('fileInput').addEventListener('change', function(e) {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('previewBox').style.display = 'block';
                    document.getElementById('restoreBtn').disabled = false;
                }
                reader.readAsDataURL(selectedFile);
            }
        });
        
        async function restorePhoto() {
            if (!selectedFile) return;
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('restoreBtn').disabled = true;
            
            // 模拟AI修复（实际API接入后替换这里）
            await new Promise(resolve => setTimeout(resolve, 3000));
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('result').innerHTML = `
                <p style="color:#4ade80;font-size:18px;">✅ 修复完成！</p>
                <p style="color:#888;margin-top:8px;">演示模式 - 完整API即将上线</p>
            `;
        }
    </script>
</body>
</html>
